services:
  gridos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gridos
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
