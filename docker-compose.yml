version: "3.9"

services:
  gridos-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gridos-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
