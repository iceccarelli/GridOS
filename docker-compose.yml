version: "3.9"

services:
  # ── GridOS API ─────────────────────────────────────────────────
  gridos-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gridos-api
    ports:
      - "8000:8000"
    environment:
      - GRIDOS_ENV=production
      - GRIDOS_LOG_LEVEL=INFO
      - GRIDOS_STORAGE_BACKEND=influxdb
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-gridos-dev-token}
      - INFLUXDB_ORG=gridos
      - INFLUXDB_BUCKET=telemetry
      - GRIDOS_CORS_ORIGINS=["*"]
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gridos-net
    volumes:
      - models-cache:/app/models_cache
      - gridos-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── InfluxDB ───────────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7
    container_name: gridos-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=gridos
      - DOCKER_INFLUXDB_INIT_PASSWORD=gridos-password
      - DOCKER_INFLUXDB_INIT_ORG=gridos
      - DOCKER_INFLUXDB_INIT_BUCKET=telemetry
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-gridos-dev-token}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    restart: unless-stopped
    networks:
      - gridos-net
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── TimescaleDB (alternative storage) ──────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: gridos-timescaledb
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=gridos
      - POSTGRES_PASSWORD=gridos-password
      - POSTGRES_DB=gridos
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - gridos-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gridos"]
      interval: 15s
      timeout: 5s
      retries: 5
    profiles:
      - timescale

  # ── Grafana (optional monitoring) ──────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: gridos-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=gridos
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - gridos-net
    profiles:
      - monitoring

volumes:
  influxdb-data:
  influxdb-config:
  timescaledb-data:
  models-cache:
  gridos-logs:
  grafana-data:

networks:
  gridos-net:
    driver: bridge
