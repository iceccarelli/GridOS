apiVersion: apps/v1
kind: Deployment
metadata:
  name: gridos-api
  namespace: gridos
  labels:
    app: gridos
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gridos
      component: api
  template:
    metadata:
      labels:
        app: gridos
        component: api
    spec:
      containers:
        - name: gridos-api
          image: gridos:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: gridos-config
          env:
            - name: INFLUXDB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gridos-secrets
                  key: influxdb-token
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: models-cache
              mountPath: /app/models_cache
      volumes:
        - name: models-cache
          persistentVolumeClaim:
            claimName: gridos-models-pvc
      terminationGracePeriodSeconds: 30
