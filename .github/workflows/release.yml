name: GridOS Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build distribution packages
        run: python -m build

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## GridOS ${{ github.ref_name }}

            This release is for the reduced GridOS launch path: a lightweight API for device registration, telemetry ingestion, telemetry lookup, and basic control workflows.

            ### Install from source

            ```bash
            git clone https://github.com/iceccarelli/GridOS.git
            cd GridOS
            pip install -e ".[dev]"
            ```

            ### Run locally

            ```bash
            cp .env.example .env
            uvicorn gridos.main:app --host 0.0.0.0 --port 8000 --reload
            ```
