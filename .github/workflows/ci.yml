name: GridOS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements/base.txt -r requirements/dev.txt
          pip install -e .

      - name: Run Ruff linter
        run: ruff check src/ tests/

      - name: Run Ruff formatter check
        run: ruff format --check src/ tests/

      - name: Run MyPy type checker
        run: mypy src/gridos/ --ignore-missing-imports

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements/base.txt -r requirements/dev.txt
          pip install -e .

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=gridos \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements/base.txt
          pip install bandit safety

      - name: Run Bandit security scan
        run: bandit -r src/gridos/ -ll --configfile .bandit.yml
        continue-on-error: true

      - name: Check dependency vulnerabilities
        run: safety check -r requirements/base.txt
        continue-on-error: true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t gridos:ci .

      - name: Test Docker image
        run: |
          docker run -d --name gridos-test -p 8000:8000 gridos:ci
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop gridos-test
