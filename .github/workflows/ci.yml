name: GridOS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt
          pip install -e .

      - name: Run Ruff
        run: ruff check src/ tests/

  test:
    name: Reduced Launch Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt
          pip install -e .

      - name: Run supported test suite
        run: |
          pytest             tests/test_api.py             tests/test_models.py             tests/test_storage.py             -v --tb=short

  docker:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t gridos:ci .

      - name: Run container smoke test
        run: |
          docker run -d --name gridos-test -p 8000:8000 gridos:ci
          sleep 10
          curl -f http://localhost:8000/health
          docker stop gridos-test
